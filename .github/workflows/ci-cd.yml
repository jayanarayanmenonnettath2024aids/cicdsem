name: CI/CD Pipeline - Student Management System

# ==================== TRIGGER ====================

# Trigger this workflow on:
on:
  # Push to main and develop branches
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  
  # Pull requests to main and develop
  pull_request:
    branches:
      - main
      - develop
  
  # Manual trigger
  workflow_dispatch:

# ==================== JOBS ====================

jobs:
  # ==================== JOB 1: LINT AND SYNTAX CHECK ====================
  
  lint:
    name: Lint and Code Quality
    runs-on: ubuntu-latest
    
    steps:
      # Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3
      
      # Setup Python
      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      # Install dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pylint
      
      # Run flake8 linting
      - name: Run Flake8 Linting
        run: |
          echo "Running Flake8 linter..."
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      # Run pylint
      - name: Run Pylint
        run: |
          echo "Running Pylint..."
          pylint app.py routes/student_manager.py --exit-zero
      
      # Check Python syntax
      - name: Check Python Syntax
        run: |
          echo "Checking Python syntax..."
          python -m py_compile app.py routes/student_manager.py

  # ==================== JOB 2: UNIT TESTS ====================
  
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
      # Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3
      
      # Setup Python
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      # Install dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      # Run pytest
      - name: Run Pytest
        run: |
          echo "Running unit tests with pytest..."
          pytest tests/ -v --tb=short --color=yes
      
      # Run pytest with coverage
      - name: Run Tests with Coverage
        run: |
          echo "Running tests with coverage report..."
          pytest tests/ --cov=. --cov-report=xml --cov-report=html --cov-report=term
      
      # Upload coverage to Codecov
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # ==================== JOB 3: BUILD DOCKER IMAGE ====================
  
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      # Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3
      
      # Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      # Login to Docker Hub (optional - comment out if not needed)
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        if: secrets.DOCKER_USERNAME != ''
      
      # Build Docker image
      - name: Build Docker Image
        run: |
          echo "Building Docker image..."
          docker build -t student-management:latest .
          docker tag student-management:latest student-management:${{ github.sha }}
      
      # Push to Docker Hub (optional)
      - name: Push to Docker Hub
        run: |
          docker push student-management:latest
          docker push student-management:${{ github.sha }}
        if: secrets.DOCKER_USERNAME != ''
      
      # Test Docker image
      - name: Test Docker Image
        run: |
          echo "Testing Docker image..."
          docker run --rm student-management:latest python -m pytest tests/ -v

  # ==================== JOB 4: SECURITY SCAN ====================
  
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      # Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3
      
      # Run Trivy vulnerability scanner
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      # Upload Trivy results to GitHub Security tab
      - name: Upload Trivy Results to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
      
      # Check for known vulnerabilities in Python packages
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install Safety
        run: pip install safety
      
      - name: Check Python Dependencies for Vulnerabilities
        run: |
          echo "Checking Python dependencies for known vulnerabilities..."
          safety check --file requirements.txt --json || true

  # ==================== JOB 5: DEPLOY TO AWS ====================
  
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: [test, build-docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      # Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3
      
      # Configure AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      # Trigger AWS CodeBuild
      - name: Trigger AWS CodeBuild
        run: |
          echo "Triggering AWS CodeBuild..."
          aws codebuild start-build \
            --project-name student-management-ci \
            --source-version main

  # ==================== JOB 6: NOTIFICATION ====================
  
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [lint, test, build-docker, security]
    if: always()
    
    steps:
      # Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3
      
      # Determine build status
      - name: Determine Build Status
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" || 
                "${{ needs.test.result }}" == "failure" || 
                "${{ needs.build-docker.result }}" == "failure" || 
                "${{ needs.security.result }}" == "failure" ]]; then
            echo "BUILD_STATUS=failure" >> $GITHUB_ENV
          else
            echo "BUILD_STATUS=success" >> $GITHUB_ENV
          fi
      
      # Send Slack notification (optional)
      - name: Send Slack Notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Build Status: ${{ env.BUILD_STATUS }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Student Management CI/CD Pipeline*\nStatus: ${{ env.BUILD_STATUS }}\nBranch: ${{ github.ref }}\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: secrets.SLACK_WEBHOOK_URL != ''

# ==================== CONCURRENCY ====================

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
