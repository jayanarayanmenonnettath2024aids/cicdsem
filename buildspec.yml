version: 0.2

phases:
  pre_build:
    commands:
      - echo "========== PRE-BUILD PHASE =========="
      - python --version
      - pip install -r requirements.txt

  build:
    commands:
      - echo "========== BUILD PHASE =========="
      - pytest tests/ -v

  post_build:
    commands:
      - echo "========== POST-BUILD PHASE =========="
      - echo "Build completed successfully"

artifacts:
  files:
    - '**/*'

cache:
  paths:
    - '/root/.cache/pip/**/*'

env:
  variables:
    FLASK_ENV: production
    PYTHONUNBUFFERED: 1